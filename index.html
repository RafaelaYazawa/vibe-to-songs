<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Styles -->
        <link rel="stylesheet" href="style.css">
        <title>Document</title>
    </head>

    <body>
        <div class="content">

            <h1 class="title">
                <span style="--i:1">S</span>
                <span style="--i:2">o</span>
                <span style="--i:3">n</span>
                <span style="--i:4">g</span>
                <br>
                <span style="--i:6">E</span>
                <span style="--i:7">x</span>
                <span style="--i:8">p</span>
                <span style="--i:9">e</span>
                <span style="--i:10">r</span>
                <span style="--i:11">i</span>
                <span style="--i:12">e</span>
                <span style="--i:13">n</span>
                <span style="--i:14">c</span>
                <span style="--i:15">e</span>
            </h1>

            <div class="audio-controls">
                <button title="Play Audio" type="button" class="audio-btn" id="play-btn">Play</button>
                <button type="button" class="audio-btn" id="reset-btn">Reset</button>
            </div>

            <canvas id="canvas"></canvas>


            <div class="toast">
                <p class="toast-message">Audio was successfully reset!</p>
            </div>
        </div>

        <script src="main.js"></script>
    </body>

</html>

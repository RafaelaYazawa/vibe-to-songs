<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Styles -->
        <link rel="stylesheet" href="style.css">

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=MuseoModerno:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet">

        <title>
            Song Visualizer
        </title>
    </head>

    <body>
        <h1 class="title">Song Visualizer</h1>

        <div class="mood-container">
            <button class="genre-card">
                Happy
            </button>

            <button class="genre-card">
                Sad
            </button>
            <button class="genre-card">
                Pop
            </button>
            <button class="genre-card">
                Jazz
            </button>
            <button class="genre-card">
                Classical
            </button>
            <button class="genre-card dreamy">
                <svg class="genre-background" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <defs>
                        <mask id="crescent-mask">
                            <rect width="100" height="100" fill="white" />

                            <circle cx="65" cy="45" r="28" fill="black" />
                        </mask>
                    </defs>

                    <circle cx="55" cy="50" r="28" fill="#ffad37" mask="url(#crescent-mask)" />
                </svg>

                <div class="genre-content">
                    <h2 class="genre-title">
                        Dreamy
                    </h2>
                    <p class="dreamy-text">
                        Ambient &bull; Soft Pop
                    </p>
                </div>
            </button>
            <button class="genre-card">
                Romantic
            </button>
            <button class=" genre-card">
                Hip-Hop
            </button>

        </div>
    </body>

</html>

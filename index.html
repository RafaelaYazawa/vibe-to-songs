<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Styles -->
        <link rel="stylesheet" href="style.css">

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,400;0,500;1,300;1,400&family=MuseoModerno:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet">

        <title>
            Song Visualizer
        </title>
    </head>

    <body>
        <div class="title-container">
            <h1 class="title">Song Visualizer</h1>
            <p class="sub-text">For better concentration</p>
        </div>

        <div class="mood-container">
            <button class="genre-card happy">
                <svg class="genre-background" viewBox="0 0 200 100">
                    <circle cx="100" cy="120" r="50" fill="#f59542" stroke="#ffc796" stroke-width="1"></circle>

                    <g class="rays">
                        <line x1="10" y1="95" x2="50" y2="95" stroke="#f59542" stroke-width="1" />

                        <line x1="20" y1="75" x2="52" y2="83" stroke="#f59542" stroke-width="1" />

                        <line x1="60" y1="68" x2="30" y2="50" stroke="#f59542" stroke-width="1" />

                        <line x1="80" y1="62" x2="65" y2="35" stroke="#f59542" stroke-width="1"></line>

                        <line x1="100" y1="60" x2="100" y2="30" stroke="#f59542" stroke-width="1" />

                        <line x1="120" y1="62" x2="135" y2="35" stroke="#f59542" stroke-width="1"></line>

                        <line x1="140" y1="68" x2="170" y2="50" stroke="#f59542" stroke-width="1" />

                        <line x1="180" y1="75" x2="148" y2="83" stroke="#f59542" stroke-width="1" />

                        <line x1="150" y1="95" x2="190" y2="95" stroke="#f59542" stroke-width="1"></line>
                    </g>
                </svg>
                <div class="genre-content">
                    <h2 class="genre-title">
                        Happy
                    </h2>
                    <p class="happy-text">
                        Dance-Pop &bull; Upbeat &bull; Tropical
                    </p>
                </div>
            </button>

            <button class="genre-card">
                Sad
            </button>
            <button class="genre-card">
                Pop
            </button>
            <button class="genre-card">
                Jazz
            </button>
            <button class="genre-card">
                Classical
            </button>
            <button class="genre-card dreamy">
                <svg class="genre-background" viewBox="0 0 200 100">
                    <defs>
                        <mask id="crescent-mask">
                            <rect width="120" height="100" fill="white" />

                            <circle cx="45" cy="50" r="30" fill="black" />
                        </mask>
                    </defs>

                    <g fill="#fff" opacity="0.6">
                        <circle cx="30" cy="30" r="0.5" fill="#fff" />
                        <circle cx="70" cy="80" r="0.6" fill="#fff" />
                        <circle cx="90" cy="62" r="0.6" fill="#fff" />
                        <circle cx="150" cy="70" r="0.4" fill="#fff" />
                        <circle cx="175" cy="75" r="0.2" fill="#fff" />
                        <circle cx="180" cy="16" r="0.7" fill="#fff" />
                    </g>

                    <circle cx="30" cy="64" r="20" fill="#ffad37" mask="url(#crescent-mask)" />

                    <g class="gemini-stars" fill="#fff">
                        <circle cx="148" cy="19" r="1" fill="#fff" />
                        <circle cx="160" cy="10" r="1" fill="#fff" />

                        <circle cx="148" cy="30" r="1" fill="#fff" />
                        <circle cx="155" cy="25" r="1" fill="#fff" />
                        <circle cx="163" cy="20" r="1" fill="#fff" />
                        <circle cx="170" cy="15" r="1" fill="#fff" />
                        <circle cx="175" cy="10" r="1" fill="#fff" />

                        <circle cx="163" cy="35" r="1" fill="#fff" />
                        <circle cx="175" cy="25" r="1" fill="#fff" />

                        <circle cx="160" cy="43" r="1" fill="#fff" />
                        <circle cx="163" cy="50" r="1" fill="#fff" />
                        <circle cx="170" cy="40" r="1" fill="#fff" />

                        <circle cx="177" cy="35" r="1" fill="#fff" />
                        <circle cx="183" cy="30" r="1" fill="#fff" />
                        <circle cx="188" cy="25" r="1" fill="#fff" />
                        <circle cx="193" cy="20" r="1" fill="#fff" />
                    </g>
                </svg>

                <div class="genre-content">
                    <h2 class="genre-title">
                        Dreamy
                    </h2>
                    <p class="dreamy-text">
                        Ambient &bull; Soft Pop
                    </p>
                </div>
            </button>
            <button class="genre-card">
                Romantic
            </button>
            <button class=" genre-card">
                Hip-Hop
            </button>

        </div>
    </body>

</html>

<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Styles -->
        <link rel="stylesheet" href="style.css">
        <title>Document</title>
    </head>

    <body>
        <div class="content">

            <h1 class="title">Song Experience</h1>

            <div class="audio-controls">
                <button title="Play Audio" type="button" class="audio-btn" id="play-audio">Play</button>
                <button type="button" class="audio-btn" id="reset-btn">Reset</button>
            </div>

            <div class="toast">
                <p class="toast-message">Audio was successfully reset!</p>
            </div>

        </div>

        <script src="main.js"></script>
    </body>

</html>
